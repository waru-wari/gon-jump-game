<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — empeo Land Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #388bfd;
      --accent-hover: #58a6ff;
      --danger: #da3633;
      --danger-hover: #f85149;
      --success: #3fb950;
      --warning: #d29922;
      --gold: #ffc93c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 24px;
      color: var(--gold);
    }

    .badge {
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Form elements ── */
    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', monospace;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      padding: 10px 18px;
      transition: opacity .15s, background .15s;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: var(--accent-hover); }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-danger:hover:not(:disabled)   { background: var(--danger-hover); }
    .btn-ghost    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled)    { border-color: var(--accent); color: var(--accent); }

    /* ── Status bar ── */
    #status-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: none;
    }

    #status-bar.ok      { border-color: var(--success); color: var(--success); }
    #status-bar.error   { border-color: var(--danger);  color: var(--danger);  }
    #status-bar.warning { border-color: var(--warning); color: var(--warning); }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: 22px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .login-card input {
      width: 100%;
      margin-bottom: 12px;
    }

    .login-card .btn {
      width: 100%;
    }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--surface2);
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr:hover { background: rgba(255,255,255,.03); }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .rank-badge {
      display: inline-block;
      min-width: 28px;
      text-align: center;
      font-weight: 700;
      color: var(--text-muted);
    }

    .score-val { color: var(--gold); font-weight: 700; }
    .email-val { font-family: monospace; color: var(--text-muted); }

    .btn-del {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--danger);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 10px;
      transition: background .1s, border-color .1s;
    }

    .btn-del:hover { background: rgba(218,54,51,.12); border-color: var(--danger); }

    /* ── Danger zone ── */
    .danger-zone {
      border-color: var(--danger);
    }

    .danger-zone .card-title {
      color: var(--danger);
    }

    /* ── Confirm modal ── */
    #confirm-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #confirm-modal.open { display: flex; }

    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--danger);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }

    .confirm-card h3 {
      color: var(--danger);
      margin-bottom: 10px;
      font-size: 16px;
    }

    .confirm-card p {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .confirm-card code {
      background: var(--surface2);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      color: var(--warning);
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* ── Misc ── */
    .stat-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Fredoka', sans-serif;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOGIN OVERLAY — shown until token is verified
     ════════════════════════════════════════════════════════ -->
<div id="login-overlay">
  <div class="login-card">
    <h2>🏆 Admin Panel</h2>
    <p>empeo Land Leaderboard</p>
    <input type="password" id="token-input" placeholder="Admin token" autocomplete="off">
    <button class="btn btn-primary" id="login-btn">Unlock →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     CONFIRM MODAL (delete / reset)
     ════════════════════════════════════════════════════════ -->
<div id="confirm-modal">
  <div class="confirm-card">
    <h3 id="confirm-title">Confirm Action</h3>
    <p id="confirm-desc"></p>
    <input type="text" id="confirm-input" placeholder="">
    <div class="confirm-actions">
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN SHELL
     ════════════════════════════════════════════════════════ -->
<div class="shell" id="main-shell" style="display:none">
  <div class="header">
    <h1>🏆 Leaderboard Admin</h1>
    <span class="badge">RESTRICTED</span>
    <span style="margin-left:auto; color:var(--text-muted); font-size:12px" id="status-summary"></span>
    <button class="btn btn-ghost" id="logout-btn" style="font-size:12px;padding:6px 12px">Logout</button>
  </div>

  <div id="status-bar"></div>

  <!-- ── Dashboard stats ── -->
  <div class="card">
    <div class="card-title">Overview</div>
    <div class="stat-row">
      <div class="stat">
        <span class="stat-label">Total Players</span>
        <span class="stat-value" id="stat-total">—</span>
      </div>
    </div>
  </div>

  <!-- ── Actions row ── -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <button class="btn btn-primary" id="btn-view">View Top 100</button>
    <button class="btn btn-ghost"   id="btn-search-open">Search by Email</button>
    <button class="btn btn-ghost"   id="btn-export">Export JSON</button>
    <button class="btn btn-danger"  id="btn-reset-open" style="margin-left:auto">⚠ Reset Board</button>
  </div>

  <!-- ── Search by email ── -->
  <div class="card" id="search-section" style="display:none">
    <div class="card-title">Search by Email</div>
    <div class="input-row">
      <input type="email" id="search-email" placeholder="player@example.com">
      <button class="btn btn-primary" id="search-btn">Search</button>
    </div>
    <div id="search-result" style="margin-top:14px"></div>
  </div>

  <!-- ── Top 100 table ── -->
  <div class="card section" id="top100-section">
    <div class="card-title">Top 100 Players</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email (censored)</th>
            <th>Score</th>
            <th>Level</th>
            <th>Played</th>
            <th>Last Seen</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="top100-body"></tbody>
      </table>
    </div>
    <div class="empty-state" id="top100-empty" style="display:none">No entries yet.</div>
  </div>
</div>

<script>
  // ── Tab-memory only — token NEVER written to storage ──────────────────────
  let _adminToken = null;

  const API = '/api/leaderboard-admin';

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const loginOverlay  = $('login-overlay');
  const mainShell     = $('main-shell');
  const loginError    = $('login-error');
  const statusBar     = $('status-bar');
  const confirmModal  = $('confirm-modal');

  // ── Admin API call helper ─────────────────────────────────────────────────
  async function adminCall(action, extra = {}) {
    const res = await fetch(API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-token': _adminToken,
      },
      body: JSON.stringify({ action, ...extra }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error ?? `HTTP ${res.status}`);
    return json;
  }

  // ── Status bar ────────────────────────────────────────────────────────────
  function showStatus(msg, type = 'ok') {
    statusBar.textContent = msg;
    statusBar.className = type;
    statusBar.style.display = 'block';
    setTimeout(() => { statusBar.style.display = 'none'; }, 5000);
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  async function tryLogin() {
    const token = $('token-input').value.trim();
    if (!token) { loginError.textContent = 'Enter the admin token.'; return; }
    loginError.textContent = '';
    $('login-btn').disabled = true;
    try {
      _adminToken = token;
      const data = await adminCall('status');
      // Success — hide overlay, show shell
      loginOverlay.style.display = 'none';
      mainShell.style.display = 'block';
      $('stat-total').textContent = data.totalEntries ?? 0;
      $('status-summary').textContent = `${data.totalEntries ?? 0} players`;
      $('token-input').value = ''; // clear from DOM
    } catch (e) {
      _adminToken = null;
      loginError.textContent = 'Invalid token — try again.';
    } finally {
      $('login-btn').disabled = false;
    }
  }

  $('login-btn').addEventListener('click', tryLogin);
  $('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  // ── Logout ────────────────────────────────────────────────────────────────
  $('logout-btn').addEventListener('click', () => {
    _adminToken = null;
    location.reload();
  });

  // ── View Top 100 ──────────────────────────────────────────────────────────
  $('btn-view').addEventListener('click', async () => {
    try {
      const data = await adminCall('top100');
      renderTop100(data.entries ?? []);
      $('top100-section').classList.add('active');
    } catch (e) {
      showStatus('Error loading top 100: ' + e.message, 'error');
    }
  });

  function renderTop100(entries) {
    const tbody = $('top100-body');
    tbody.innerHTML = '';
    if (!entries.length) {
      $('top100-empty').style.display = 'block';
      return;
    }
    $('top100-empty').style.display = 'none';
    entries.forEach(e => {
      const tr = document.createElement('tr');
      const lastSeen = e.lastPlayedAt
        ? new Date(Number(e.lastPlayedAt)).toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' })
        : '—';
      tr.innerHTML = `
        <td><span class="rank-badge">#${e.rank}</span></td>
        <td>${esc(e.name)}</td>
        <td class="email-val">${esc(e.emailDisplay)}</td>
        <td class="score-val">${Number(e.score).toLocaleString()}</td>
        <td>Lv.${e.bestLevel}</td>
        <td>${e.timesPlayed}</td>
        <td style="font-size:12px;color:var(--text-muted)">${lastSeen}</td>
        <td><button class="btn-del" data-hash="${esc(e.hash)}" data-email="${esc(e.emailDisplay)}">Delete</button></td>
      `;
      tbody.appendChild(tr);
    });

    // Wire delete buttons
    tbody.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', () => {
        openConfirm(
          'Delete Player',
          `Re-type the censored email to confirm deletion of <code>${btn.dataset.email}</code>:`,
          btn.dataset.email,
          async () => { await adminCall('delete', { email: btn.dataset.email }); btn.closest('tr').remove(); },
        );
      });
    });
  }

  // ── Search ────────────────────────────────────────────────────────────────
  $('btn-search-open').addEventListener('click', () => {
    $('search-section').style.display =
      $('search-section').style.display === 'none' ? 'block' : 'none';
  });

  $('search-btn').addEventListener('click', async () => {
    const email = $('search-email').value.trim();
    if (!email) return;
    const result = $('search-result');
    try {
      const data = await adminCall('search', { email });
      if (!data.entry) {
        result.innerHTML = '<span style="color:var(--text-muted)">No player found with that email.</span>';
        return;
      }
      const e = data.entry;
      result.innerHTML = `
        <div class="card" style="margin:0">
          <div><strong>${esc(e.name)}</strong> &nbsp;·&nbsp; <span class="email-val">${esc(e.emailDisplay)}</span></div>
          <div style="margin-top:6px;color:var(--text-muted);font-size:12px">
            Score: <span class="score-val">${Number(e.score).toLocaleString()}</span>
            &nbsp;·&nbsp; Lv.${e.bestLevel}
            &nbsp;·&nbsp; Played ${e.timesPlayed}×
            &nbsp;·&nbsp; Consent: ${e.consentedAt ? new Date(Number(e.consentedAt)).toLocaleString() : 'n/a'}
          </div>
          <button class="btn btn-danger" style="margin-top:12px;font-size:12px;padding:6px 14px"
            id="search-delete-btn">Delete this player</button>
        </div>`;
      $('search-delete-btn').addEventListener('click', () => {
        openConfirm(
          'Delete Player',
          `Re-type the censored email to confirm deletion of <code>${esc(e.emailDisplay)}</code>:`,
          e.emailDisplay,
          async () => { await adminCall('delete', { email }); result.innerHTML = '<span style="color:var(--success)">Player deleted.</span>'; },
        );
      });
    } catch (err) {
      showStatus('Search error: ' + err.message, 'error');
    }
  });

  // ── Export JSON ───────────────────────────────────────────────────────────
  $('btn-export').addEventListener('click', async () => {
    try {
      const data = await adminCall('export');
      const blob = new Blob([JSON.stringify(data.entries, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `empeoland-export-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
      showStatus(`Exported ${data.entries.length} entries.`, 'ok');
    } catch (e) {
      showStatus('Export error: ' + e.message, 'error');
    }
  });

  // ── Reset board ───────────────────────────────────────────────────────────
  $('btn-reset-open').addEventListener('click', () => {
    openConfirm(
      '⚠ Reset Entire Leaderboard',
      'This will DELETE all scores permanently. Type <code>RESET</code> to confirm:',
      'RESET',
      async () => {
        const data = await adminCall('reset');
        showStatus(`Leaderboard reset — ${data.deleted} entries deleted.`, 'warning');
        $('stat-total').textContent = '0';
        $('top100-body').innerHTML = '';
      },
    );
  });

  // ── Confirm modal ─────────────────────────────────────────────────────────
  let _confirmCallback = null;
  let _confirmExpected = '';

  function openConfirm(title, desc, expected, callback) {
    $('confirm-title').textContent = title;
    $('confirm-desc').innerHTML = desc;
    $('confirm-input').value = '';
    $('confirm-input').placeholder = expected;
    _confirmExpected = expected;
    _confirmCallback = callback;
    confirmModal.classList.add('open');
    setTimeout(() => $('confirm-input').focus(), 50);
  }

  $('confirm-ok').addEventListener('click', async () => {
    if ($('confirm-input').value.trim() !== _confirmExpected) {
      $('confirm-input').style.borderColor = 'var(--danger)';
      setTimeout(() => $('confirm-input').style.borderColor = '', 800);
      return;
    }
    confirmModal.classList.remove('open');
    try {
      await _confirmCallback();
      showStatus('Action completed.', 'ok');
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  });

  $('confirm-cancel').addEventListener('click', () => confirmModal.classList.remove('open'));

  // ── Escape HTML helper ────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
